<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家族Todo 履歴</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/family-todo.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">けしたToDoの履歴</h1>
        <a th:href="@{/todo}" class="btn btn-outline-secondary">もどる</a>
    </div>

    <div th:if="${#lists.isEmpty(todos)}" class="card soft-card shadow-sm border-0">
        <div class="card-body text-center py-5">
            <p class="mb-0">まだ履歴はないよ</p>
        </div>
    </div>

    <div th:unless="${#lists.isEmpty(todos)}" class="card soft-card soft-table shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>タイトル</th>
                    <th>かぞく</th>
                    <th>カテゴリ</th>
                    <th>期限</th>
                    <th>けした日時</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">タイトル</td>
                    <td th:text="${todo.assigneeLabel}">父</td>
                    <td th:text="${todo.category}">家事</td>
                    <td th:text="${todo.deadline}">2026-03-02</td>
                    <td th:text="${todo.deletedAt != null ? #temporals.format(todo.deletedAt, 'yyyy-MM-dd HH:mm') : '-'}">2026-03-02 12:34</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
</body>
</html>
