<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家族Todo 一覧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/family-todo.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">家族Todo</h1>
        <div class="d-flex gap-2">
            <a th:href="@{/todo/history}" class="btn btn-outline-secondary">履歴</a>
            <a th:href="@{/todo/new}" class="btn btn-primary">新規登録</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show js-auto-dismiss" role="alert">
        <span th:text="${successMessage}">処理が完了しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show js-auto-dismiss" role="alert">
        <span th:text="${errorMessage}">処理に失敗しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card soft-card shadow-sm border-0 mb-3">
        <div class="card-body p-4">
            <h2 class="h5 mb-2">担当者をえらんで新規へ</h2>
            <p class="text-muted small mb-3">えらんだら すぐ次の画面にすすむよ（母はママページへ）</p>
            <form method="get" action="/todo/new" id="assigneeForm" class="assignee-selector assignee-picker">
                <label class="assignee-option assignee-father">
                    <input type="radio" name="assignee" value="父" onchange="goNextByAssignee(this.value)">
                    <span>父</span>
                </label>
                <label class="assignee-option assignee-mother">
                    <input type="radio" name="assignee" value="母" onchange="goNextByAssignee(this.value)">
                    <span>母</span>
                </label>
                <label class="assignee-option assignee-me">
                    <input type="radio" name="assignee" value="僕" onchange="goNextByAssignee(this.value)">
                    <span>僕</span>
                </label>
                <label class="assignee-option assignee-sister">
                    <input type="radio" name="assignee" value="姉" onchange="goNextByAssignee(this.value)">
                    <span>姉</span>
                </label>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(todos)}" class="card soft-card shadow-sm border-0">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">ToDoがまだないよ</h2>
            <p class="text-muted mb-4">新規登録から作ってみよう</p>
        </div>
    </div>

    <div th:unless="${#lists.isEmpty(todos)}" class="card soft-card soft-table shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0 family-todo-table">
                <thead class="table-dark">
                <tr>
                    <th style="width: 70px;">ID</th>
                    <th>タイトル</th>
                    <th style="width: 130px;">期限</th>
                    <th style="width: 110px;">カテゴリ</th>
                    <th style="width: 120px;">かぞく</th>
                    <th style="width: 120px;">状態</th>
                    <th style="width: 330px;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}" th:with="code=${todo.assigneeCode}"
                    th:classappend="${code == 'FATHER'} ? ' row-father' :
                                    (${code == 'MOTHER'} ? ' row-mother' :
                                    (${code == 'ME'} ? ' row-me' :
                                    (${code == 'SISTER'} ? ' row-sister' : '')))">
                    <td th:text="${todo.id}">1</td>
                    <td>
                        <span th:text="${todo.title}" th:style="${todo.completed} ? 'text-decoration: line-through;' : ''">タイトル</span>
                    </td>
                    <td th:text="${todo.deadline}">2026-03-02</td>
                    <td th:text="${todo.category}">家事</td>
                    <td>
                        <div class="family-icon"
                             role="img"
                             th:attr="aria-label=${todo.assigneeLabel}"
                             th:classappend="${code == 'FATHER'} ? ' family-father' :
                                             (${code == 'MOTHER'} ? ' family-mother' :
                                             (${code == 'ME'} ? ' family-me' :
                                             (${code == 'SISTER'} ? ' family-sister' : '')))">
                            <span class="visually-hidden" th:text="${todo.assigneeLabel}">父</span>
                            <div th:switch="${code}">
                                <svg th:case="'FATHER'" class="family-face-svg" viewBox="0 0 36 36" aria-hidden="true">
                                    <circle cx="18" cy="18" r="11" class="face-skin"/>
                                    <path d="M8 14c1-5 6-8 10-8s9 3 10 8" class="hair-fill"/>
                                    <circle cx="14" cy="18" r="1.3" class="face-line"/>
                                    <circle cx="22" cy="18" r="1.3" class="face-line"/>
                                    <path d="M14 23c2 1.6 6 1.6 8 0" class="face-line"/>
                                </svg>
                                <svg th:case="'MOTHER'" class="family-face-svg" viewBox="0 0 36 36" aria-hidden="true">
                                    <circle cx="18" cy="18" r="11" class="face-skin"/>
                                    <path d="M7.5 16C8.5 9.5 12.5 7 18 7s9.5 2.5 10.5 9" class="hair-fill"/>
                                    <circle cx="14" cy="18" r="1.2" class="face-line"/>
                                    <circle cx="22" cy="18" r="1.2" class="face-line"/>
                                    <path d="M14 22.5c2.2 2 5.8 2 8 0" class="face-smile"/>
                                </svg>
                                <svg th:case="'ME'" class="family-face-svg" viewBox="0 0 36 36" aria-hidden="true">
                                    <circle cx="18" cy="18" r="11" class="face-skin"/>
                                    <path d="M9 14.5c1-4.5 5-7.5 9-7.5s8 3 9 7.5" class="hair-fill"/>
                                    <circle cx="14" cy="18" r="1.2" class="face-line"/>
                                    <circle cx="22" cy="18" r="1.2" class="face-line"/>
                                    <path d="M14 23h8" class="face-line"/>
                                </svg>
                                <svg th:case="'SISTER'" class="family-face-svg" viewBox="0 0 36 36" aria-hidden="true">
                                    <circle cx="18" cy="18" r="11" class="face-skin"/>
                                    <path d="M7 16c1-6 5-9 11-9s10 3 11 9" class="hair-fill"/>
                                    <path d="M8.5 15c.4 4.5 2.5 8 5.8 10.5M27.5 15c-.4 4.5-2.5 8-5.8 10.5" class="hair-line"/>
                                    <circle cx="14" cy="18" r="1.2" class="face-line"/>
                                    <circle cx="22" cy="18" r="1.2" class="face-line"/>
                                    <path d="M14 22.8c2 1.8 6 1.8 8 0" class="face-smile"/>
                                </svg>
                                <svg th:case="*" class="family-face-svg" viewBox="0 0 36 36" aria-hidden="true">
                                    <circle cx="18" cy="18" r="11" class="face-skin"/>
                                    <circle cx="14" cy="18" r="1.2" class="face-line"/>
                                    <circle cx="22" cy="18" r="1.2" class="face-line"/>
                                    <path d="M14 23h8" class="face-line"/>
                                </svg>
                            </div>
                        </div>
                    </td>
                    <td>
                        <span th:if="${todo.statusCode == statusDeleteRequested}" class="badge text-bg-warning">おねがい中</span>
                        <span th:unless="${todo.statusCode == statusDeleteRequested}" th:text="${todo.completed} ? '完了' : 'まだです'">まだです</span>
                    </td>
                    <td>
                        <div class="d-flex gap-2" th:if="${todo.statusCode == statusActive}">
                            <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-sm"
                                        th:classappend="${todo.completed} ? ' btn-outline-secondary' : ' btn-success'"
                                        th:text="${todo.completed} ? 'まだですに戻す' : 'おわった'">おわった</button>
                            </form>
                            <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-outline-primary btn-sm">変える</a>
                            <form th:action="@{/todo/{id}/request-delete(id=${todo.id})}" method="post" class="d-inline">
                                <button type="submit" class="btn btn-danger btn-sm">やめる</button>
                            </form>
                        </div>
                        <div th:if="${todo.statusCode == statusDeleteRequested}">
                            <p class="small mb-2">ママがOKしたら消えるよ</p>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    function goNextByAssignee(assignee) {
        if (assignee === "母") {
            window.location.href = "/todo/mom";
            return;
        }
        document.getElementById("assigneeForm").submit();
    }

    setTimeout(function () {
        document.querySelectorAll(".js-auto-dismiss").forEach(function (el) {
            var alert = bootstrap.Alert.getOrCreateInstance(el);
            alert.close();
        });
    }, 3000);
</script>
</body>
</html>
