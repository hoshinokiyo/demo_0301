<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家族Todo 一覧</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/family-todo.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">家族Todo</h1>
        <a th:href="@{/todo/new}" class="btn btn-primary">新規登録</a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show js-auto-dismiss" role="alert">
        <span th:text="${successMessage}">処理が完了しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show js-auto-dismiss" role="alert">
        <span th:text="${errorMessage}">処理に失敗しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card soft-card shadow-sm border-0 mb-3">
        <div class="card-body p-4">
            <h2 class="h5 mb-3">担当者選択</h2>
            <form method="get" action="/todo/new" class="assignee-selector assignee-picker">
                <label class="assignee-option assignee-father" style="background-color:#7f7fff;">
                    <input type="radio" name="assignee" value="FATHER" onchange="this.form.submit()">
                    <span>父</span>
                </label>
                <label class="assignee-option assignee-mother" style="background-color:#ff7f7f;">
                    <input type="radio" name="assignee" value="MOTHER" onchange="this.form.submit()">
                    <span>母</span>
                </label>
                <label class="assignee-option assignee-me" style="background-color:#ffff7f;">
                    <input type="radio" name="assignee" value="ME" onchange="this.form.submit()">
                    <span>僕</span>
                </label>
                <label class="assignee-option assignee-sister" style="background-color:#ff7fbf;">
                    <input type="radio" name="assignee" value="SISTER" onchange="this.form.submit()">
                    <span>姉</span>
                </label>
            </form>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(todos)}" class="card soft-card shadow-sm border-0">
        <div class="card-body text-center py-5">
            <h2 class="h5 mb-3">ToDoがまだ登録されていません</h2>
            <p class="text-muted mb-4">上の担当者を選んで、新しいToDoを追加してください。</p>
        </div>
    </div>

    <div th:unless="${#lists.isEmpty(todos)}" class="card soft-card soft-table shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th scope="col" style="width: 80px;">ID</th>
                    <th scope="col">タイトル</th>
                    <th scope="col" style="width: 140px;">期限</th>
                    <th scope="col" style="width: 120px;">カテゴリ</th>
                    <th scope="col" style="width: 180px;">担当者</th>
                    <th scope="col" style="width: 110px;">完了状態</th>
                    <th scope="col" style="width: 280px;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}">
                    <td th:text="${todo.id}">1</td>
                    <td>
                        <span th:text="${todo.title}"
                              th:style="${todo.completed} ? 'text-decoration: line-through;' : ''">サンプルタスク</span>
                    </td>
                    <td th:text="${todo.deadline}">2026-03-02</td>
                    <td th:text="${todo.category}">家事</td>
                    <td th:with="code=${todo.assigneeCode}">
                        <span class="assignee-chip"
                              th:classappend="${code == 'FATHER'} ? ' assignee-father' :
                                              (${code == 'MOTHER'} ? ' assignee-mother' :
                                              (${code == 'ME'} ? ' assignee-me' :
                                              (${code == 'SISTER'} ? ' assignee-sister' : '')))"
                              th:text="${todo.assigneeLabel}">父</span>
                    </td>
                    <td th:text="${todo.completed} ? '完了' : '未完了'">未完了</td>
                    <td class="d-flex gap-2">
                        <form th:action="@{/todo/{id}/toggle(id=${todo.id})}" method="post" class="d-inline">
                            <button type="submit"
                                    class="btn btn-sm"
                                    th:classappend="${todo.completed} ? ' btn-outline-secondary' : ' btn-success'"
                                    th:text="${todo.completed} ? '未完了に戻す' : '完了にする'">完了にする</button>
                        </form>
                        <a th:href="@{/todo/{id}/edit(id=${todo.id})}" class="btn btn-outline-primary btn-sm">編集</a>
                        <form th:action="@{/todo/{id}/delete(id=${todo.id})}"
                              method="post"
                              class="d-inline"
                              onsubmit="return confirm('本当に削除しますか？');">
                            <button type="submit" class="btn btn-danger btn-sm">削除</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    setTimeout(function () {
        document.querySelectorAll(".js-auto-dismiss").forEach(function (el) {
            var alert = bootstrap.Alert.getOrCreateInstance(el);
            alert.close();
        });
    }, 3000);
</script>
</body>
</html>
