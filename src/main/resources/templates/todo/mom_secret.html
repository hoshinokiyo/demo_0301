<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${initialSetup} ? '合言葉入力' : '合言葉を変える'">合言葉</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/family-todo.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card soft-card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3" th:text="${initialSetup} ? '合言葉入力' : '合言葉を変える'">合言葉を変える</h1>
                    <p class="text-muted small mb-3" th:if="${initialSetup}">
                        はじめてなので、これから使う合言葉を設定してね。
                    </p>

                    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">合言葉を変更したよ</div>
                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">変更できないよ</div>

                    <form th:action="@{/todo/mom/secret}" method="post" th:object="${momSecretForm}">
                        <div class="mb-3" th:if="${!initialSetup}">
                            <label for="currentSecret" class="form-label fw-semibold">今の合言葉</label>
                            <div class="input-group">
                                <input id="currentSecret" type="password" class="form-control" th:field="*{currentSecret}" required>
                                <button type="button" class="btn btn-outline-secondary"
                                        data-target="currentSecret"
                                        aria-label="合言葉を隠す表示"
                                        title="合言葉を隠す表示"
                                        onclick="toggleSecretField(this)">
                                    <span class="eye-toggle-icon" aria-hidden="true">
                                        <svg class="eye-svg eye-open d-none" viewBox="0 0 24 24">
                                            <path class="eye-line" d="M2 12C4 8 7.5 6 12 6s8 2 10 6c-2 4-5.5 6-10 6s-8-2-10-6z"/>
                                            <circle class="eye-pupil" cx="12" cy="12" r="2.7"/>
                                            <path class="lash" d="M7.2 6.2l-1.4-1.8M10.5 5.2l-.5-2.1M13.8 5.2l.5-2.1M16.8 6.2l1.4-1.8"/>
                                        </svg>
                                        <svg class="eye-svg eye-closed" viewBox="0 0 24 24">
                                            <path class="eye-line" d="M3 12c2.2 2.8 5.2 4.2 9 4.2s6.8-1.4 9-4.2"/>
                                            <path class="eye-line" d="M6 13.2l-2 2M9.2 14.8l-1 2.3M14.8 14.8l1 2.3M18 13.2l2 2"/>
                                            <path class="lash" d="M7.2 8.2l-1.4-1.8M10.5 7.3l-.5-2M13.8 7.3l.5-2M16.8 8.2l1.4-1.8"/>
                                        </svg>
                                    </span>
                                </button>
                            </div>
                            <div class="text-danger small mt-1" th:errors="*{currentSecret}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="newSecret" class="form-label fw-semibold">新しい合言葉</label>
                            <div class="input-group">
                                <input id="newSecret" type="password" class="form-control" th:field="*{newSecret}" required>
                                <button type="button" class="btn btn-outline-secondary"
                                        data-target="newSecret"
                                        aria-label="合言葉を隠す表示"
                                        title="合言葉を隠す表示"
                                        onclick="toggleSecretField(this)">
                                    <span class="eye-toggle-icon" aria-hidden="true">
                                        <svg class="eye-svg eye-open d-none" viewBox="0 0 24 24">
                                            <path class="eye-line" d="M2 12C4 8 7.5 6 12 6s8 2 10 6c-2 4-5.5 6-10 6s-8-2-10-6z"/>
                                            <circle class="eye-pupil" cx="12" cy="12" r="2.7"/>
                                            <path class="lash" d="M7.2 6.2l-1.4-1.8M10.5 5.2l-.5-2.1M13.8 5.2l.5-2.1M16.8 6.2l1.4-1.8"/>
                                        </svg>
                                        <svg class="eye-svg eye-closed" viewBox="0 0 24 24">
                                            <path class="eye-line" d="M3 12c2.2 2.8 5.2 4.2 9 4.2s6.8-1.4 9-4.2"/>
                                            <path class="eye-line" d="M6 13.2l-2 2M9.2 14.8l-1 2.3M14.8 14.8l1 2.3M18 13.2l2 2"/>
                                            <path class="lash" d="M7.2 8.2l-1.4-1.8M10.5 7.3l-.5-2M13.8 7.3l.5-2M16.8 8.2l1.4-1.8"/>
                                        </svg>
                                    </span>
                                </button>
                            </div>
                            <div class="text-danger small mt-1" th:errors="*{newSecret}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="confirmSecret" class="form-label fw-semibold">確認用</label>
                            <div class="input-group">
                                <input id="confirmSecret" type="password" class="form-control" th:field="*{confirmSecret}" required>
                                <button type="button" class="btn btn-outline-secondary"
                                        data-target="confirmSecret"
                                        aria-label="合言葉を隠す表示"
                                        title="合言葉を隠す表示"
                                        onclick="toggleSecretField(this)">
                                    <span class="eye-toggle-icon" aria-hidden="true">
                                        <svg class="eye-svg eye-open d-none" viewBox="0 0 24 24">
                                            <path class="eye-line" d="M2 12C4 8 7.5 6 12 6s8 2 10 6c-2 4-5.5 6-10 6s-8-2-10-6z"/>
                                            <circle class="eye-pupil" cx="12" cy="12" r="2.7"/>
                                            <path class="lash" d="M7.2 6.2l-1.4-1.8M10.5 5.2l-.5-2.1M13.8 5.2l.5-2.1M16.8 6.2l1.4-1.8"/>
                                        </svg>
                                        <svg class="eye-svg eye-closed" viewBox="0 0 24 24">
                                            <path class="eye-line" d="M3 12c2.2 2.8 5.2 4.2 9 4.2s6.8-1.4 9-4.2"/>
                                            <path class="eye-line" d="M6 13.2l-2 2M9.2 14.8l-1 2.3M14.8 14.8l1 2.3M18 13.2l2 2"/>
                                            <path class="lash" d="M7.2 8.2l-1.4-1.8M10.5 7.3l-.5-2M13.8 7.3l.5-2M16.8 8.2l1.4-1.8"/>
                                        </svg>
                                    </span>
                                </button>
                            </div>
                            <div class="text-danger small mt-1" th:errors="*{confirmSecret}"></div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary"
                                    th:text="${initialSetup} ? '設定する' : '変更する'">変更する</button>
                            <a th:href="@{/todo/mom}" class="btn btn-outline-secondary">もどる</a>
                        </div>
                    </form>

                    <hr class="my-4" th:if="${!initialSetup}">
                    <div th:if="${!initialSetup}">
                        <h2 class="h6 mb-2">承認者初期化</h2>
                        <p class="text-muted small mb-3">次の承認者を決めると、合言葉は初期化されます。</p>
                        <form th:action="@{/todo/mom/reset-approver}" method="post" th:object="${approverResetForm}">
                            <div class="assignee-selector mb-3">
                                <label class="assignee-option assignee-father">
                                    <input type="radio" th:field="*{nextApprover}" value="FATHER" required>
                                    <span>父</span>
                                </label>
                                <label class="assignee-option assignee-mother">
                                    <input type="radio" th:field="*{nextApprover}" value="MOTHER">
                                    <span>母</span>
                                </label>
                                <label class="assignee-option assignee-me">
                                    <input type="radio" th:field="*{nextApprover}" value="ME">
                                    <span>僕</span>
                                </label>
                                <label class="assignee-option assignee-sister">
                                    <input type="radio" th:field="*{nextApprover}" value="SISTER">
                                    <span>姉</span>
                                </label>
                            </div>
                            <div class="text-danger small mt-1 mb-2" th:errors="*{nextApprover}"></div>
                            <button type="submit" class="btn btn-outline-danger">承認者初期化</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script>
    function toggleSecretField(button) {
        var targetId = button.getAttribute("data-target");
        var input = document.getElementById(targetId);
        if (!input) return;

        var isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        var isVisible = input.type === "text";
        var eyeOpen = button.querySelector(".eye-open");
        var eyeClosed = button.querySelector(".eye-closed");
        if (eyeOpen && eyeClosed) {
            eyeOpen.classList.toggle("d-none", !isVisible);
            eyeClosed.classList.toggle("d-none", isVisible);
        }

        if (isVisible) {
            button.setAttribute("aria-label", "合言葉表示");
            button.setAttribute("title", "合言葉表示");
        } else {
            button.setAttribute("aria-label", "合言葉を隠す表示");
            button.setAttribute("title", "合言葉を隠す表示");
        }
    }
</script>
</body>
</html>
