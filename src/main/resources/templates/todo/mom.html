<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ママの承認ページ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/family-todo.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h3 mb-0">承認ページ</h1>
        <div class="d-flex gap-2">
            <a th:if="${!isApprover}" th:href="@{/todo/mom/start}" class="btn btn-primary">合言葉です</a>
            <a th:if="${isApprover and !isSecretInitialized}" th:href="@{/todo/mom/secret}" class="btn btn-primary">合言葉です</a>
            <a th:if="${isApprover and isSecretInitialized and !isAuthenticated}" th:href="@{/todo/mom/enter}" class="btn btn-primary">合言葉です</a>
            <a th:if="${isApprover and isAuthenticated}" th:href="@{/todo/mom/secret}" class="btn btn-outline-primary">合言葉です</a>
            <form th:if="${isAuthenticated}" th:action="@{/todo/mom/exit}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary">承認モード終了</button>
            </form>
            <a th:href="@{/todo}" class="btn btn-secondary">通常一覧にもどる</a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show js-auto-dismiss" role="alert">
        <span th:text="${successMessage}">処理が完了しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show js-auto-dismiss" role="alert">
        <span th:text="${errorMessage}">処理に失敗しました</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <p class="text-muted small mb-3">
        いまの人: <span th:text="${currentUserLabel}">僕</span>
        / 承認者: <span th:text="${approverLabel}">母</span>
    </p>

    <div th:unless="${isAuthenticated}" class="card soft-card shadow-sm border-0 mb-3">
        <div class="card-body py-4">
            <p class="mb-2">承認するには「合言葉です」から進んでね。</p>
            <p class="text-muted small mb-0">初回は合言葉を設定、2回目以降は合言葉を入力して承認します。</p>
        </div>
    </div>

    <div th:if="${isAuthenticated and #lists.isEmpty(todos)}" class="card soft-card shadow-sm border-0">
        <div class="card-body text-center py-5">
            <p class="mb-0">おねがい中のToDoはないよ</p>
        </div>
    </div>

    <div th:if="${isAuthenticated and !#lists.isEmpty(todos)}" class="card soft-card soft-table shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0 family-todo-table">
                <thead class="table-dark">
                <tr>
                    <th style="width: 70px;">ID</th>
                    <th>タイトル</th>
                    <th style="width: 120px;">かぞく</th>
                    <th style="width: 110px;">カテゴリ</th>
                    <th style="width: 130px;">期限</th>
                    <th style="width: 190px;">操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="todo : ${todos}" th:with="code=${todo.assigneeCode}"
                    th:classappend="${code == 'FATHER'} ? ' row-father' :
                                    (${code == 'MOTHER'} ? ' row-mother' :
                                    (${code == 'ME'} ? ' row-me' :
                                    (${code == 'SISTER'} ? ' row-sister' : '')))">
                    <td th:text="${todo.id}">1</td>
                    <td th:text="${todo.title}">タイトル</td>
                    <td th:text="${todo.assigneeLabel}">父</td>
                    <td th:text="${todo.category}">家事</td>
                    <td th:text="${todo.deadline}">2026-03-02</td>
                    <td>
                        <form th:action="@{/todo/{id}/approve-delete(id=${todo.id})}" method="post" class="d-inline">
                            <button type="submit" class="btn btn-warning btn-sm">OK（けしていいよ）</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
<script>
    setTimeout(function () {
        document.querySelectorAll(".js-auto-dismiss").forEach(function (el) {
            var alert = bootstrap.Alert.getOrCreateInstance(el);
            alert.close();
        });
    }, 3000);
</script>
</body>
</html>
