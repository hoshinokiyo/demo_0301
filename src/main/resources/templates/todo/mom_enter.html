<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>合言葉入力</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/family-todo.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
            <div class="card soft-card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">合言葉入力</h1>
                    <p class="text-muted small mb-3">承認するために合言葉を入れてね。</p>

                    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}">合言葉がちがうよ</div>

                    <form th:action="@{/todo/mom/enter}" method="post" th:object="${momEnterForm}">
                        <div class="mb-3">
                            <label for="secret" class="form-label fw-semibold">合言葉</label>
                            <div class="input-group">
                                <input id="secret" type="password" class="form-control form-control-lg" th:field="*{secret}" required>
                                <button type="button" class="btn btn-outline-secondary"
                                        data-target="secret"
                                        aria-label="合言葉を隠す表示"
                                        title="合言葉を隠す表示"
                                        onclick="toggleSecretField(this)">
                                    <span class="eye-toggle-icon" aria-hidden="true">
                                        <svg class="eye-svg eye-open d-none" viewBox="0 0 24 24">
                                            <path class="eye-line" d="M2 12C4 8 7.5 6 12 6s8 2 10 6c-2 4-5.5 6-10 6s-8-2-10-6z"/>
                                            <circle class="eye-pupil" cx="12" cy="12" r="2.7"/>
                                            <path class="lash" d="M7.2 6.2l-1.4-1.8M10.5 5.2l-.5-2.1M13.8 5.2l.5-2.1M16.8 6.2l1.4-1.8"/>
                                        </svg>
                                        <svg class="eye-svg eye-closed" viewBox="0 0 24 24">
                                            <path class="eye-line" d="M3 12c2.2 2.8 5.2 4.2 9 4.2s6.8-1.4 9-4.2"/>
                                            <path class="eye-line" d="M6 13.2l-2 2M9.2 14.8l-1 2.3M14.8 14.8l1 2.3M18 13.2l2 2"/>
                                            <path class="lash" d="M7.2 8.2l-1.4-1.8M10.5 7.3l-.5-2M13.8 7.3l.5-2M16.8 8.2l1.4-1.8"/>
                                        </svg>
                                    </span>
                                </button>
                            </div>
                            <div class="text-danger small mt-1" th:errors="*{secret}"></div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">入る</button>
                            <a th:href="@{/todo/mom}" class="btn btn-outline-secondary">もどる</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script>
    function toggleSecretField(button) {
        var targetId = button.getAttribute("data-target");
        var input = document.getElementById(targetId);
        if (!input) return;

        var isPassword = input.type === "password";
        input.type = isPassword ? "text" : "password";
        var isVisible = input.type === "text";
        var eyeOpen = button.querySelector(".eye-open");
        var eyeClosed = button.querySelector(".eye-closed");
        if (eyeOpen && eyeClosed) {
            eyeOpen.classList.toggle("d-none", !isVisible);
            eyeClosed.classList.toggle("d-none", isVisible);
        }

        if (isVisible) {
            button.setAttribute("aria-label", "合言葉表示");
            button.setAttribute("title", "合言葉表示");
        } else {
            button.setAttribute("aria-label", "合言葉を隠す表示");
            button.setAttribute("title", "合言葉を隠す表示");
        }
    }
</script>
</body>
</html>
