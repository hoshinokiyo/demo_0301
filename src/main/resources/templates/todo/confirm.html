<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo Confirm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <h1 class="h4 mb-3">Confirm ToDo</h1>

            <div class="card shadow-sm mb-3">
                <div class="card-header">Registration Detail</div>
                <div class="card-body">
                    <p class="mb-0"><span class="fw-semibold">Title:</span> <span th:text="${title}">Sample Task</span></p>
                </div>
            </div>

            <div class="d-flex gap-2">
                <a th:href="@{/todo/complete}" class="btn btn-primary">Register</a>
                <a th:href="@{/todo/new}" class="btn btn-outline-secondary">Back</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
