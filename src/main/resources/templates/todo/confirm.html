<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家族Todo 登録確認</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/family-todo.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7">
            <h1 class="h4 mb-3">登録内容の確認</h1>
            <form th:action="@{/todo/complete}" method="post">
                <div class="card soft-card shadow-sm border-0 mb-3">
                    <div class="card-header">確認内容</div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">タイトル</label>
                            <input type="text" class="form-control" th:value="${title}" readonly>
                            <input type="hidden" name="title" th:value="${title}">
                        </div>
                        <div>
                            <label class="form-label fw-semibold">担当者</label>
                            <input type="text" class="form-control" th:value="${assigneeLabel}" readonly>
                            <input type="hidden" name="assignee" th:value="${assignee}">
                        </div>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="button" class="btn btn-outline-secondary" onclick="history.back()">戻る</button>
                    <button type="submit" class="btn btn-primary">登録</button>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
