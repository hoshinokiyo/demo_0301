<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>家族Todo 新規登録</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link th:href="@{/css/family-todo.css}" rel="stylesheet">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-9 col-lg-7">
            <div class="card soft-card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h4 mb-4">家族Todo 新規登録</h1>

                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}">
                        担当者を選択してください
                    </div>

                    <form th:action="@{/todo/confirm}" method="post">
                        <div class="mb-3">
                            <label for="title" class="form-label fw-semibold">タイトル</label>
                            <input id="title"
                                   name="title"
                                   type="text"
                                   class="form-control form-control-lg"
                                   placeholder="やることを入力"
                                   th:value="${title}"
                                   required>
                        </div>

                        <fieldset class="mb-4">
                            <legend class="col-form-label pt-0 fw-semibold">担当者（必須）</legend>
                            <div class="assignee-selector">
                                <label class="assignee-option assignee-father">
                                    <input type="radio" name="assignee" value="父" th:checked="${assignee == '父'}" required>
                                    <span>父</span>
                                </label>
                                <label class="assignee-option assignee-mother">
                                    <input type="radio" name="assignee" value="母" th:checked="${assignee == '母'}">
                                    <span>母</span>
                                </label>
                                <label class="assignee-option assignee-me">
                                    <input type="radio" name="assignee" value="僕" th:checked="${assignee == '僕'}">
                                    <span>僕</span>
                                </label>
                                <label class="assignee-option assignee-sister">
                                    <input type="radio" name="assignee" value="姉" th:checked="${assignee == '姉'}">
                                    <span>姉</span>
                                </label>
                            </div>
                        </fieldset>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4">確認画面へ</button>
                            <a th:href="@{/todo}" class="btn btn-outline-secondary px-4">戻る</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
