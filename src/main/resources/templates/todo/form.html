<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo新規登録</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body class="bg-light">
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="h4 mb-4">ToDo新規登録</h1>

                    <div th:if="${errorMessage}" class="alert alert-danger" role="alert" th:text="${errorMessage}">
                        担当者を選択してください
                    </div>

                    <form th:action="@{/todo/confirm}" method="post">
                        <div class="mb-3">
                            <label for="title" class="form-label">タイトル</label>
                            <input id="title"
                                   name="title"
                                   type="text"
                                   class="form-control"
                                   placeholder="ToDoのタイトルを入力"
                                   th:value="${title}"
                                   required>
                        </div>

                        <fieldset class="mb-4">
                            <legend class="col-form-label pt-0 fw-semibold">担当者（必須）</legend>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="assignee" id="assignee-father" value="父"
                                       th:checked="${assignee == '父'}" required>
                                <label class="form-check-label" for="assignee-father">父</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="assignee" id="assignee-mother" value="母"
                                       th:checked="${assignee == '母'}">
                                <label class="form-check-label" for="assignee-mother">母</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="assignee" id="assignee-me" value="僕"
                                       th:checked="${assignee == '僕'}">
                                <label class="form-check-label" for="assignee-me">僕</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="assignee" id="assignee-sister" value="お姉ちゃん"
                                       th:checked="${assignee == 'お姉ちゃん'}">
                                <label class="form-check-label" for="assignee-sister">お姉ちゃん</label>
                            </div>
                        </fieldset>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">確認画面へ</button>
                            <a th:href="@{/todo}" class="btn btn-outline-secondary">戻る</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
